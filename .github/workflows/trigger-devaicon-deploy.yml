name: Trigger Devaicon deploy

# Devaicon/email-agent's own deployment only fires on pushes it receives
# directly. When a contributor pushes to a different remote (e.g. origin),
# Devaicon/email-agent never sees that push and its deploy never re-fires.
# This relays activity over as an empty, no-op commit so its deployment
# wakes up without actually syncing code (code sync stays a manual/PR
# decision).
on:
  push:
    branches:
      - main
      - development
      - production
  # Lets you manually fire a run from the Actions tab (pick the branch via
  # the "Use workflow from" dropdown) to verify the token/permissions work
  # without waiting for or faking a real push.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  trigger-devaicon-deploy:
    # Skip when this push IS one of the auto-generated trigger commits
    # below, so the empty push doesn't re-trigger itself in a loop.
    # (head_commit only exists on push events, so manual runs always pass.)
    if: "github.event_name != 'push' || !contains(github.event.head_commit.message, '[trigger-devaicon-deploy]')"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.ref_name }}

      - name: Push empty trigger commit to Devaicon/email-agent
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: trigger Devaicon deploy [trigger-devaicon-deploy]"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" "HEAD:${{ github.ref_name }}"
