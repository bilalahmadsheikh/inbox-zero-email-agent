packages:
  - packages/*
  - apps/*

enableGlobalVirtualStore: true

# Supply-chain hardening: block versions published <24h ago. Malicious npm releases
# are typically yanked within hours, so the cooldown blocks the attack window.
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - "@inboxzero/*"
  - "@inbox-zero/emulate"

# tiptap-markdown's published package.json only declares @tiptap/core as a
# peer dependency, but its bundled code imports from @tiptap/pm/* directly.
# Under strict pnpm isolation this leaves @tiptap/pm unresolvable from within
# tiptap-markdown's module scope, breaking the compose editor under Turbopack.
packageExtensions:
  "tiptap-markdown@0.8.10":
    peerDependencies:
      "@tiptap/pm": "^2.0.0"
  # @hookform/resolvers imports zod/v4/core internally (the zod resolver
  # subpath) but doesn't declare zod as a dependency or peer dependency, so
  # it's unresolvable from its own module scope under strict pnpm isolation.
  "@hookform/resolvers@5.2.2":
    peerDependencies:
      zod: "^4.0.0"

overrides:
  "@hono/node-server": "1.19.14"
  "@tiptap/core": "2.27.2"
  "@types/react": "19.2.14"
  "@types/react-dom": "19.2.3"
  "@xmldom/xmldom": "0.8.13"
  axios: "1.16.1"
  fast-xml-parser: "5.8.0"
  ioredis: "5.10.1"
  js-yaml: "3.14.2"
  jws: "4.0.1"
  linkify-it: "5.0.1"
  lodash: "4.18.1"
  next: "16.2.6"
  postcss: "8.5.14"
  svelte: "5.55.5"
  vite: "7.3.6"
  webpack: "5.106.2"

# Only reviewed dependencies may run install scripts.
allowBuilds:
  "@google/genai": true
  "@prisma/engines": true
  "@sentry/cli": true
  braintrust: true
  core-js: true
  esbuild: true
  msgpackr-extract: true
  prisma: true
  protobufjs: true
  sharp: true
  workerd: true
